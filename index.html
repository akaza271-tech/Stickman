<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Stickman Arena</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; pointer-events: none; }
        .health-bar { width: 150px; height: 15px; background: #444; border: 2px solid #fff; }
        .fill { height: 100%; background: #0f0; width: 100%; transition: width 0.1s; }
        
        /* Split Screen Mobile Controls */
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .side { display: grid; grid-template-columns: repeat(2, 60px); gap: 10px; pointer-events: auto; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 1px solid #fff; border-radius: 10px; 
                   display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; user-select: none; }
        .btn:active { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div id="ui">
    <div>P1 <div class="health-bar"><div id="p1H" class="fill"></div></div></div>
    <div>P2 <div class="health-bar"><div id="p2H" class="fill"></div></div></div>
</div>

<div class="controls">
    <div class="side">
        <div class="btn" id="p1L">←</div><div class="btn" id="p1R">→</div>
        <div class="btn" id="p1J">UP</div><div class="btn" id="p1A">HIT</div>
    </div>
    <div class="side">
        <div class="btn" id="p2L">←</div><div class="btn" id="p2R">→</div>
        <div class="btn" id="p2J">UP</div><div class="btn" id="p2A">HIT</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7.5);
scene.add(light, new THREE.AmbientLight(0x404040));

// Ground
const ground = new THREE.Mesh(new THREE.BoxGeometry(20, 1, 10), new THREE.MeshPhongMaterial({color: 0x444444}));
ground.position.y = -0.5;
scene.add(ground);

const keys = {};
const clock = new THREE.Clock();

// --- FIGHTER CLASS ---
class Fighter {
    constructor(x, color, controls) {
        this.group = new THREE.Group();
        this.controls = controls;
        this.health = 100;
        this.velY = 0;
        this.isAttacking = false;

        // Body Parts (3D Boxes)
        const bodyMat = new THREE.MeshPhongMaterial({ color });
        this.torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.4), bodyMat);
        this.head = new THREE.Mesh(new THREE.SphereGeometry(0.25), bodyMat);
        this.head.position.y = 0.8;
        this.armR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), bodyMat);
        this.armR.position.set(0.4, 0.1, 0);
        
        this.group.add(this.torso, this.head, this.armR);
        this.group.position.x = x;
        scene.add(this.group);
    }

    update(opponent) {
        let speed = 0.1;
        // Movement
        if (keys[this.controls.L]) this.group.position.x -= speed;
        if (keys[this.controls.R]) this.group.position.x += speed;
        
        // Jump (Gravity math)
        if (keys[this.controls.J] && this.group.position.y <= 0) this.velY = 0.2;
        this.group.position.y += this.velY;
        if (this.group.position.y > 0) this.velY -= 0.01;
        else { this.group.position.y = 0; this.velY = 0; }

        // Animation (Breathe/Walk)
        let t = clock.getElapsedTime();
        this.group.rotation.y = (this.group.position.x > opponent.group.position.x) ? -Math.PI/2 : Math.PI/2;
        this.head.position.y = 0.8 + Math.sin(t * 5) * 0.02;

        // Attack
        if (keys[this.controls.A] && !this.isAttacking) {
            this.isAttacking = true;
            this.armR.rotation.x = -Math.PI / 2; // Punch animation
            
            if (Math.abs(this.group.position.x - opponent.group.position.x) < 1.2) {
                opponent.health -= 5;
            }
            setTimeout(() => { this.isAttacking = false; this.armR.rotation.x = 0; }, 200);
        }
    }
}

// --- INITIALIZE PLAYERS ---
const p1 = new Fighter(-3, 0xff0000, {L:'p1L', R:'p1R', J:'p1J', A:'p1A'});
const p2 = new Fighter(3, 0x0000ff, {L:'p2L', R:'p2R', J:'p2J', A:'p2A'});

// --- CONTROLS LOGIC ---
window.onkeydown = (e) => {
    if(e.code === 'KeyA') keys.p1L = true; if(e.code === 'KeyD') keys.p1R = true;
    if(e.code === 'KeyW') keys.p1J = true; if(e.code === 'KeyF') keys.p1A = true;
    if(e.code === 'ArrowLeft') keys.p2L = true; if(e.code === 'ArrowRight') keys.p2R = true;
    if(e.code === 'ArrowUp') keys.p2J = true; if(e.code === 'KeyM') keys.p2A = true;
};
window.onkeyup = (e) => {
    if(e.code === 'KeyA') keys.p1L = false; if(e.code === 'KeyD') keys.p1R = false;
    if(e.code === 'KeyW') keys.p1J = false; if(e.code === 'KeyF') keys.p1A = false;
    if(e.code === 'ArrowLeft') keys.p2L = false; if(e.code === 'ArrowRight') keys.p2R = false;
    if(e.code === 'ArrowUp') keys.p2J = false; if(e.code === 'KeyM') keys.p2A = false;
};

// Mobile Touch
function bind(id) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[id] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[id] = false; });
}
['p1L','p1R','p1J','p1A','p2L','p2R','p2J','p2A'].forEach(bind);

camera.position.z = 8;
camera.position.y = 2;

// --- GAME LOOP ---
function animate() {
    requestAnimationFrame(animate);
    p1.update(p2);
    p2.update(p1);
    
    document.getElementById('p1H').style.width = p1.health + "%";
    document.getElementById('p2H').style.width = p2.health + "%";
    
    if(p1.health <= 0 || p2.health <= 0) {
        alert("Game Over!");
        p1.health = 100; p2.health = 100;
    }
    
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
